# values.yaml
replicaCount: 1

image:
  repository: otnipid/espresso-api
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 3001
  targetPort: http
  nodePort: null

ingress:
  enabled: false

resources: {}
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Database configuration
database:
  host: "espresso-db-postgres"
  port: 5432
  name: "espresso"
  username: "espresso_user"
  password: "espresso_pass"