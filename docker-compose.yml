services:
  # Custom PostgreSQL database with pre-loaded schemas
  postgres:
    image: ghcr.io/otnipid/espresso-ml-postgres:latest
    container_name: ${COMPOSE_PROJECT_NAME:-espresso_ml}_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-espresso_ml_test}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres_user}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - espresso-network
    profiles:
      - local
      - test

  # Redis service
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-espresso_ml}_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - espresso-network
    profiles:
      - local
      - test

  # API service for local development
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-espresso_ml}_api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # Database configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-postgres_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      DB_NAME: ${POSTGRES_DB:-espresso_ml_dev}
      # Redis configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # API configuration
      API_PORT: ${API_PORT:-3001}
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - espresso-network
    profiles:
      - local
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  coverage:
  test-results:

networks:
  espresso-network:
    driver: bridge
