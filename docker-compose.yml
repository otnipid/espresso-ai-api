services:
  # Espresso ML PostgreSQL database with pre-loaded schemas
  postgres:
    image: ghcr.io/otnipid/espresso-ai-db-postgres:develop
    container_name: ${COMPOSE_PROJECT_NAME:-espresso_ml}_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - espresso-network
    profiles:
      - local
      - test

  # Redis service
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-espresso_ml}_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - espresso-network
    profiles:
      - local
      - test

  # API service for local development
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-espresso_ml}_api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # Database configuration (matching api-integration.md standards)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # Optional database settings
      DB_SSL: ${DB_SSL:-false}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_CONNECTION_TIMEOUT: ${DB_CONNECTION_TIMEOUT:-30}
      DB_STATEMENT_TIMEOUT: ${DB_STATEMENT_TIMEOUT:-60}
      # Redis configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # API configuration
      API_PORT: ${API_PORT:-3001}
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - espresso-network
    profiles:
      - local
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  coverage:
  test-results:

networks:
  espresso-network:
    driver: bridge
